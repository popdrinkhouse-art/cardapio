<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pop Drink House</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0a0a0a; color: white; font-family: 'Montserrat', sans-serif; margin: 0; padding: 20px; text-align: center; }
        header { padding: 20px; border-bottom: 2px solid #ff007f; margin-bottom: 20px; }
        h1 { color: #ff007f; text-transform: uppercase; letter-spacing: 2px; margin: 0; }
        .drink-card { background: rgba(255, 255, 255, 0.05); border-radius: 15px; padding: 15px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(255, 255, 255, 0.1); }
        .info { text-align: left; }
        .info h3 { margin: 0; color: #ff007f; }
        .price { color: #ffd700; font-weight: bold; }
        .controls { display: flex; align-items: center; gap: 10px; }
        button { background: #ff007f; border: none; color: white; width: 35px; height: 35px; border-radius: 50%; font-weight: bold; font-size: 18px; }
        .footer { position: fixed; bottom: 0; left: 0; width: 100%; background: #000; padding: 15px; border-top: 2px solid #ff007f; display: flex; justify-content: space-around; align-items: center; box-sizing: border-box; }
        .btn-whatsapp { background: #25d366; color: white; padding: 10px 20px; border-radius: 20px; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <header>
        <h1>Pop Drink House</h1>
        <p>Cardápio Exclusivo 2025</p>
    </header>

    <div id="lista-drinks">
        <!-- Item 0 -->
        <div class="drink-card">
            <div class="info"><h3>Neon Gin</h3><span class="price">R$ 32,00</span></div>
            <div class="controls">
                <button onclick="update(0, -1)">-</button>
                <span id="q0">0</span>
                <button onclick="update(0, 1)">+</button>
            </div>
        </div>
        <!-- Item 1 -->
        <div class="drink-card">
            <div class="info"><h3>Sex on the Beach</h3><span class="price">R$ 28,00</span></div>
            <div class="controls">
                <button onclick="update(1, -1)">-</button>
                <span id="q1">0</span>
                <button onclick="update(1, 1)">+</button>
            </div>
        </div>
        <!-- Item 2 -->
        <div class="drink-card">
            <div class="info"><h3>Caipirinha Especial</h3><span class="price">R$ 22,00</span></div>
            <div class="controls">
                <button onclick="update(2, -1)">-</button>
                <span id="q2">0</span>
                <button onclick="update(2, 1)">+</button>
            </div>
        </div>
        <!-- Item 3 -->
        <div class="drink-card">
            <div class="info"><h3>Mojito Refresh</h3><span class="price">R$ 25,00</span></div>
            <div class="controls">
                <button onclick="update(3, -1)">-</button>
                <span id="q3">0</span>
                <button onclick="update(3, 1)">+</button>
            </div>
        </div>
    </div>

    <div style="height: 100px;"></div>

    <div class="footer">
        <div>Total: <span id="total" style="color:#ffd700">R$ 0,00</span></div>
        <a href="#" class="btn-whatsapp" onclick="enviar()">Pedir no Whats</a>
    </div>

    <script>
        let itens = [
            {n: 'Neon Gin', p: 32, q: 0},
            {n: 'Sex on the Beach', p: 28, q: 0},
            {n: 'Caipirinha Especial', p: 22, q: 0},
            {n: 'Mojito Refresh', p: 25, q: 0}
        ];
        function update(i, c) {
            itens[i].q = Math.max(0, itens[i].q + c);
            document.getElementById('q'+i).innerText = itens[i].q;
            let t = itens.reduce((a, b) => a + (b.p * b.q), 0);
            document.getElementById('total').innerText = 'R$ ' + t.toFixed(2).replace('.', ',');
        }
        function enviar() {
            let msg = "Olá! Gostaria de fazer um pedido:\n";
            let pedido = itens.filter(i => i.q > 0);
            if(pedido.length === 0) return alert("Adicione pelo menos um drink!");
            pedido.forEach(i => { msg += `${i.q}x ${i.n}\n`; });
            window.open("https://wa.me/5512996146442?text=" + encodeURIComponent(msg));
        }
    </script>
</body>
</html>
