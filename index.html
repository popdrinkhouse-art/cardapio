<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Pop Drink House — Cardápio</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --black:   #0A0A0A;
  --dark:    #111111;
  --pink:    #E91E8C;
  --pink2:   #FF4DB8;
  --pink3:   #FF85D0;
  --gold:    #F5C518;
  --gold2:   #FFD84D;
  --cream:   #FFF5F9;
  --muted:   #9A8A90;
  --glass:   rgba(255,255,255,0.04);
  --border-p: rgba(233,30,140,0.30);
  --border-g: rgba(245,197,24,0.30);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:var(--black);color:var(--cream);font-family:'Montserrat',sans-serif;font-weight:300;min-height:100vh;overflow-x:hidden;}

/* grain */
body::before{content:’’;position:fixed;inset:0;background-image:url(“data:image/svg+xml,%3Csvg viewBox=‘0 0 256 256’ xmlns=‘http://www.w3.org/2000/svg’%3E%3Cfilter id=‘n’%3E%3CfeTurbulence type=‘fractalNoise’ baseFrequency=‘0.9’ numOctaves=‘4’ stitchTiles=‘stitch’/%3E%3C/filter%3E%3Crect width=‘100%25’ height=‘100%25’ filter=‘url(%23n)’ opacity=‘0.03’/%3E%3C/svg%3E”);pointer-events:none;z-index:0;}

/* glows */
.glow-tl{position:fixed;top:-180px;left:-180px;width:520px;height:520px;border-radius:50%;background:radial-gradient(circle,rgba(233,30,140,0.20) 0%,transparent 70%);pointer-events:none;z-index:0;}
.glow-br{position:fixed;bottom:-180px;right:-180px;width:480px;height:480px;border-radius:50%;background:radial-gradient(circle,rgba(245,197,24,0.14) 0%,transparent 70%);pointer-events:none;z-index:0;}
.glow-mid{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:900px;height:900px;border-radius:50%;background:radial-gradient(circle,rgba(233,30,140,0.04) 0%,transparent 65%);pointer-events:none;z-index:0;}

/* ── HERO ── */
.hero{position:relative;z-index:1;text-align:center;padding:60px 24px 48px;border-bottom:1px solid var(–border-p);}
.hero-badge{display:inline-block;font-size:9px;font-weight:700;letter-spacing:5px;text-transform:uppercase;color:var(–gold);border:1px solid var(–border-g);padding:6px 20px;border-radius:2px;margin-bottom:24px;animation:fadeDown .8s ease both;}
.logo-wrap{width:160px;height:160px;margin:0 auto 20px;border-radius:50%;overflow:hidden;box-shadow:0 0 40px rgba(233,30,140,.5),0 0 80px rgba(233,30,140,.2);border:2px solid rgba(233,30,140,.4);animation:fadeDown .9s .1s ease both;}
.logo-wrap img{width:100%;height:100%;object-fit:cover;}
.hero h1{font-family:‘Playfair Display’,serif;font-size:clamp(36px,9vw,68px);font-weight:900;line-height:.9;letter-spacing:-1px;background:linear-gradient(135deg,#fff 0%,var(–pink2) 40%,var(–gold) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:fadeUp .9s .2s ease both;}
.hero h1 em{display:block;font-style:italic;font-weight:700;font-size:.5em;letter-spacing:8px;text-transform:uppercase;background:linear-gradient(90deg,var(–gold) 0%,var(–gold2) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:6px;}
.hero-line{display:flex;align-items:center;justify-content:center;gap:14px;margin:20px auto;animation:fadeUp 1s .35s ease both;}
.hero-line::before,.hero-line::after{content:’’;flex:1;max-width:70px;height:1px;}
.hero-line::before{background:linear-gradient(90deg,transparent,var(–pink));}
.hero-line::after{background:linear-gradient(90deg,var(–pink),transparent);}
.hero-line span{font-size:8px;letter-spacing:6px;text-transform:uppercase;color:var(–pink2);font-weight:600;}
.hero-sub{font-size:14px;color:var(–muted);letter-spacing:.5px;animation:fadeUp 1s .45s ease both;}

/* ── SECTION ── */
.section-title{position:relative;z-index:1;text-align:center;padding:48px 24px 32px;}
.section-title h2{font-family:‘Playfair Display’,serif;font-size:clamp(20px,5vw,30px);font-weight:700;color:var(–cream);}
.section-title h2 span{color:var(–pink2);}
.section-title p{font-size:13px;color:var(–muted);margin-top:6px;letter-spacing:.3px;}

/* ── GRID ── */
.menu-grid{position:relative;z-index:1;display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:18px;max-width:1100px;margin:0 auto;padding:0 20px 140px;}

/* ── CARD ── */
.card{background:var(–glass);border:1px solid var(–border-p);border-radius:12px;overflow:hidden;transition:transform .35s ease,border-color .35s ease,box-shadow .35s ease;cursor:pointer;position:relative;animation:fadeUp .7s ease both;}
.card:nth-child(1){animation-delay:.1s}.card:nth-child(2){animation-delay:.2s}
.card:nth-child(3){animation-delay:.3s}.card:nth-child(4){animation-delay:.4s}
.card::before{content:’’;position:absolute;inset:0;background:linear-gradient(135deg,rgba(233,30,140,.07) 0%,transparent 55%);opacity:0;transition:opacity .35s;pointer-events:none;border-radius:12px;}
.card:hover{transform:translateY(-5px);border-color:var(–pink);box-shadow:0 0 0 1px rgba(233,30,140,.4),0 24px 60px rgba(0,0,0,.6),0 0 40px rgba(233,30,140,.15);}
.card:hover::before{opacity:1;}
.card.selected{border-color:var(–gold);box-shadow:0 0 0 1px var(–gold2),0 24px 60px rgba(0,0,0,.6),0 0 40px rgba(245,197,24,.18);}
.card.selected::before{opacity:1;background:linear-gradient(135deg,rgba(245,197,24,.06) 0%,transparent 55%);}

/* visual */
.card-visual{height:170px;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;background:linear-gradient(180deg,rgba(233,30,140,.06) 0%,transparent 100%);}
.drink-art{font-size:78px;filter:drop-shadow(0 4px 20px rgba(233,30,140,.5));transition:transform .4s ease;position:relative;z-index:1;}
.card:hover .drink-art{transform:scale(1.12) rotate(-4deg);}
.bg-glow{position:absolute;inset:0;transition:opacity .4s;}
.card-tag{position:absolute;top:12px;left:12px;font-size:8px;letter-spacing:3px;text-transform:uppercase;font-weight:700;color:var(–gold);background:rgba(0,0,0,.75);border:1px solid rgba(245,197,24,.4);padding:4px 10px;border-radius:20px;}
.card-check{position:absolute;top:12px;right:12px;width:28px;height:28px;border-radius:50%;border:1.5px solid var(–border-p);background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;transition:all .3s ease;font-size:13px;}
.card.selected .card-check{background:linear-gradient(135deg,var(–gold),var(–gold2));border-color:var(–gold2);box-shadow:0 0 14px rgba(245,197,24,.6);}

/* body */
.card-body{padding:20px 20px 18px;}
.card-name{font-family:‘Playfair Display’,serif;font-size:21px;font-weight:700;color:var(–cream);margin-bottom:3px;}
.card-name em{font-style:italic;color:var(–pink2);}
.card-subtitle{font-size:8px;letter-spacing:3px;text-transform:uppercase;color:var(–muted);margin-bottom:12px;font-weight:600;}
.card-divider{height:1px;background:linear-gradient(90deg,var(–border-p),transparent);margin-bottom:12px;}
.card-ingredients{font-size:13px;color:var(–muted);line-height:1.85;margin-bottom:14px;font-weight:300;}
.card-ingredients strong{color:rgba(255,245,249,.65);font-size:10px;letter-spacing:1px;text-transform:uppercase;font-weight:600;}
.card-footer-row{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:14px;}
.card-volume{display:inline-flex;align-items:center;gap:6px;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(–pink3);font-weight:600;}
.card-volume::before{content:’’;width:16px;height:1px;background:var(–pink3);}
.card-price{font-family:‘Playfair Display’,serif;font-size:22px;font-weight:700;background:linear-gradient(90deg,var(–gold),var(–gold2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}

/* variantes */
.variant-wrap{margin-bottom:14px;}
.variant-label-top{font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(–muted);font-weight:600;margin-bottom:8px;}
.variant-btns{display:flex;gap:8px;}
.variant-btn{flex:1;padding:10px 6px;border-radius:8px;border:1px solid var(–border-p);background:rgba(233,30,140,.05);color:var(–muted);cursor:pointer;font-family:‘Montserrat’,sans-serif;font-size:8px;font-weight:700;letter-spacing:1px;text-transform:uppercase;transition:all .25s;text-align:center;line-height:1;}
.variant-btn:hover{border-color:var(–pink);color:var(–cream);background:rgba(233,30,140,.1);}
.variant-btn.active{border-color:var(–gold);background:rgba(245,197,24,.1);color:var(–gold2);}
.vbtn-rotulo{display:block;margin-bottom:5px;}
.vbtn-preco{display:block;font-family:‘Playfair Display’,serif;font-size:15px;font-weight:700;letter-spacing:0;background:linear-gradient(90deg,var(–gold),var(–gold2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}

/* qty */
.qty-row{display:flex;align-items:center;justify-content:space-between;margin-top:4px;}
.qty-label{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(–muted);font-weight:600;}
.qty-ctrl{display:flex;align-items:center;border:1px solid var(–border-p);border-radius:8px;overflow:hidden;}
.qty-btn{width:34px;height:34px;background:rgba(233,30,140,.08);border:none;color:var(–pink2);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s;font-weight:300;}
.qty-btn:hover{background:rgba(233,30,140,.22);}
.qty-num{width:38px;height:34px;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:var(–cream);background:rgba(0,0,0,.3);border-left:1px solid var(–border-p);border-right:1px solid var(–border-p);font-family:‘Playfair Display’,serif;}

/* ── FLOAT CART ── */
.float-cart{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);z-index:100;background:rgba(8,4,8,.97);border:1px solid var(–pink);border-radius:12px;padding:14px 22px;display:flex;align-items:center;gap:18px;backdrop-filter:blur(24px);box-shadow:0 0 0 1px rgba(233,30,140,.2),0 24px 60px rgba(0,0,0,.8),0 0 40px rgba(233,30,140,.2);min-width:320px;transition:opacity .3s,transform .3s;opacity:0;pointer-events:none;}
.float-cart.visible{opacity:1;pointer-events:all;transform:translateX(-50%) translateY(0);}
.cart-info{flex:1;min-width:0;}
.cart-count{font-size:8px;letter-spacing:4px;text-transform:uppercase;color:var(–pink2);font-weight:700;}
.cart-items-preview{font-size:12px;color:var(–muted);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:300;}
.btn-concluir{background:linear-gradient(135deg,var(–pink) 0%,#C0156E 100%);color:#fff;border:none;padding:11px 22px;border-radius:8px;font-family:‘Montserrat’,sans-serif;font-size:9px;letter-spacing:3px;text-transform:uppercase;font-weight:700;cursor:pointer;transition:all .25s ease;white-space:nowrap;box-shadow:0 4px 20px rgba(233,30,140,.4);}
.btn-concluir:hover{background:linear-gradient(135deg,var(–pink2) 0%,var(–pink) 100%);box-shadow:0 6px 28px rgba(233,30,140,.6);transform:translateY(-1px);}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.9);backdrop-filter:blur(14px);display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s;}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal{background:#0E080E;border:1px solid var(–border-p);border-bottom:none;border-radius:16px 16px 0 0;width:100%;max-width:520px;padding:36px 28px 48px;transform:translateY(40px);transition:transform .4s cubic-bezier(.16,1,.3,1);max-height:90vh;overflow-y:auto;}
.modal-overlay.open .modal{transform:translateY(0);}
.modal-handle{width:40px;height:4px;border-radius:2px;background:var(–border-p);margin:-20px auto 28px;}
.modal h3{font-family:‘Playfair Display’,serif;font-size:26px;color:var(–cream);margin-bottom:5px;}
.modal-sub{font-size:13px;color:var(–muted);margin-bottom:24px;font-weight:300;}
.order-list{margin-bottom:20px;}
.order-item{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(–border-p);}
.order-item-left{flex:1;min-width:0;}
.order-item-name{font-family:‘Playfair Display’,serif;font-size:16px;color:var(–cream);}
.order-item-detail{font-size:11px;color:var(–muted);margin-top:2px;font-weight:300;}
.order-item-right{text-align:right;margin-left:14px;flex-shrink:0;}
.order-item-qty{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(–pink2);font-weight:700;}
.order-item-preco{font-family:‘Playfair Display’,serif;font-size:14px;color:var(–gold2);margin-top:2px;}
.order-total{display:flex;justify-content:space-between;align-items:center;padding:16px 0 4px;}
.order-total-label{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(–muted);font-weight:600;}
.order-total-val{font-family:‘Playfair Display’,serif;font-size:24px;font-weight:700;background:linear-gradient(90deg,var(–gold),var(–gold2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.modal-label{font-size:8px;letter-spacing:3px;text-transform:uppercase;color:var(–pink2);font-weight:700;margin-bottom:10px;display:block;}
.modal-input{width:100%;background:rgba(233,30,140,.05);border:1px solid var(–border-p);border-radius:8px;color:var(–cream);font-family:‘Montserrat’,sans-serif;font-size:13px;padding:12px 14px;outline:none;transition:border-color .2s;margin-bottom:20px;font-weight:300;}
.modal-input:focus{border-color:var(–pink);}
.modal-input::placeholder{color:var(–muted);}
.modal-divider{height:1px;background:linear-gradient(90deg,var(–border-p),transparent);margin:4px 0 22px;}
.channel-label{font-size:8px;letter-spacing:3px;text-transform:uppercase;color:var(–gold);font-weight:700;margin-bottom:12px;display:block;}
.channel-btns{display:flex;gap:12px;margin-bottom:10px;flex-wrap:wrap;}
.btn-channel{flex:1;min-width:120px;padding:14px 16px;border-radius:10px;border:1px solid var(–border-p);background:rgba(255,255,255,.03);color:var(–cream);cursor:pointer;font-family:‘Montserrat’,sans-serif;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;display:flex;align-items:center;justify-content:center;gap:10px;transition:all .25s;text-decoration:none;}
.btn-channel svg{width:18px;height:18px;flex-shrink:0;}
.btn-channel.whatsapp:hover{background:rgba(37,211,102,.12);border-color:#25D366;color:#25D366;box-shadow:0 0 20px rgba(37,211,102,.2);}
.btn-channel.instagram:hover{background:rgba(233,30,140,.12);border-color:var(–pink);color:var(–pink2);box-shadow:0 0 20px rgba(233,30,140,.2);}
.modal-note{font-size:11px;color:var(–muted);text-align:center;margin-top:14px;font-weight:300;}

/* footer */
.footer{position:relative;z-index:1;text-align:center;padding:36px 24px 100px;border-top:1px solid var(–border-p);}
.footer-logo{font-family:‘Playfair Display’,serif;font-size:16px;font-style:italic;background:linear-gradient(90deg,var(–pink2),var(–gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:6px;}
.footer-copy{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(–muted);}

/* anims */
@keyframes fadeDown{from{opacity:0;transform:translateY(-14px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

@media(max-width:480px){
.menu-grid{grid-template-columns:1fr;}
.float-cart{min-width:calc(100vw - 32px);}
.variant-btn{font-size:7px;padding:8px 4px;}
.vbtn-preco{font-size:13px;}
.logo-wrap{width:130px;height:130px;}
}
</style>

</head>

<div class="glow-br"></div>
<div class="glow-mid"></div>
